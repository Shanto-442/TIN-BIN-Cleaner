<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Number Cleaner</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #e8e8e8;
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      border: 1px solid #222;
      padding: 36px 32px;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 24px; height: 24px;
      border-top: 2px solid #c8a84b;
      border-left: 2px solid #c8a84b;
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 24px; height: 24px;
      border-bottom: 2px solid #c8a84b;
      border-right: 2px solid #c8a84b;
    }

    .title {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #c8a84b;
      margin-bottom: 6px;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      margin-bottom: 28px;
      line-height: 1.2;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      color: #e8e8e8;
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      padding: 12px 14px;
      outline: none;
      resize: vertical;
      min-height: 100px;
      line-height: 1.6;
      transition: border-color 0.2s;
    }
    textarea::placeholder { color: #333; }
    textarea:focus { border-color: #c8a84b; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #2a2a2a;
      font-size: 11px;
      letter-spacing: 0.2em;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      border-top: 1px solid #1a1a1a;
    }

    .output-box {
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      min-height: 60px;
      padding: 12px 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      color: #c8a84b;
      word-break: break-all;
      letter-spacing: 0.05em;
      line-height: 1.6;
      transition: border-color 0.2s;
    }
    .output-box.has-value { border-color: #2a2a2a; }
    .output-box .placeholder { color: #333; font-size: 13px; }

    .stats {
      display: flex;
      gap: 20px;
      margin-top: 12px;
    }
    .stat {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #444;
    }
    .stat span { color: #888; }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      flex: 1;
      background: #c8a84b;
      color: #000;
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #e0bf6a; }
    button:active { transform: scale(0.98); }

    button.secondary {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #555;
    }
    button.secondary:hover { border-color: #555; color: #999; background: transparent; }

    .copied-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #c8a84b;
      color: #000;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 10px 22px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .copied-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
<div class="card">
  <div class="title">Utility Tool</div>
  <h1>Number Cleaner</h1>

  <label>Paste Your Number</label>
  <textarea id="inputBox" placeholder="e.g.  +880 1711-234 567  or  (012) 345-6789 ext. 10"></textarea>

  <div class="btn-row" style="margin-top:10px;">
    <button class="secondary" onclick="clearInput()">Clear</button>
    <button class="secondary" onclick="pasteInput()">Paste</button>
  </div>

  <div class="divider">OUTPUT</div>

  <label>Digits Only</label>
  <div class="output-box" id="outputBox">
    <span class="placeholder">Result will appear here…</span>
  </div>

  <div class="stats">
    <div class="stat">Removed: <span id="removedCount">—</span></div>
    <div class="stat">Digits: <span id="digitCount">—</span></div>
  </div>

  <div class="btn-row">
    <button onclick="copyResult()">Copy Result</button>
    <button class="secondary" onclick="clearAll()">Clear</button>
  </div>
</div>

<div class="copied-toast" id="toast">Copied!</div>

<script>
  const inputBox  = document.getElementById("inputBox");
  const outputBox = document.getElementById("outputBox");
  const removedEl = document.getElementById("removedCount");
  const digitEl   = document.getElementById("digitCount");

  let cleanedValue = "";

  function process() {
    const raw = inputBox.value;
    const cleaned = raw.replace(/\D/g, "");
    cleanedValue = cleaned;

    const removed = raw.length - cleaned.length;

    if (cleaned.length === 0) {
      outputBox.innerHTML = `<span class="placeholder">${raw.length > 0 ? "No digits found." : "Result will appear here…"}</span>`;
      removedEl.textContent = raw.length > 0 ? removed : "—";
      digitEl.textContent   = raw.length > 0 ? 0 : "—";
      return;
    }

    outputBox.textContent = cleaned;
    removedEl.textContent = removed;
    digitEl.textContent   = cleaned.length;
  }

  // Live — runs on every keystroke or paste
  inputBox.addEventListener("input", process);
  inputBox.addEventListener("paste", () => setTimeout(process, 0));

  function copyResult() {
    if (!cleanedValue) return;
    navigator.clipboard.writeText(cleanedValue).then(() => {
      const toast = document.getElementById("toast");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1800);
    });
  }

  function clearInput() {
    inputBox.value = "";
    cleanedValue = "";
    outputBox.innerHTML = `<span class="placeholder">Result will appear here…</span>`;
    removedEl.textContent = "—";
    digitEl.textContent   = "—";
  }

  function clearAll() { clearInput(); }

  async function pasteInput() {
    try {
      const text = await navigator.clipboard.readText();
      inputBox.value = text;
      process();
    } catch {
      inputBox.focus();
      document.execCommand("paste");
    }
  }
</script>
</body>
</html>
